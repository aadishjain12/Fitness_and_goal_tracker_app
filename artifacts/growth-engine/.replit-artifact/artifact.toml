kind = "mobile"
previewPath = "/"
title = "AI Growth Engine"
version = "1.0.0"
id = "artifacts/growth-engine"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24942

[services.development]
run = "pnpm --filter @workspace/growth-engine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/growth-engine", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/growth-engine", "run", "serve" ]

[services.env]
PORT = "24942"
BASE_PATH = "/"
